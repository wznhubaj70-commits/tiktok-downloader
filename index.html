<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WZN_DL — Universal Downloader</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"Share Tech Mono"', '"Fira Code"', 'monospace'],
          },
          colors: {
            cyber: {
              bg: '#0a0512',
              card: '#120a21',
              neon: '#a855f7',
              blue: '#c084fc',
              muted: '#3b0764',
            }
          }
        }
      }
    }
  </script>

  <!-- Google Fonts: Share Tech Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" />

  <style>
    /* ─── Base Roxo Cyber ─── */
    * { box-sizing: border-box; }

    body {
      background-color: #0a0512;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(168,85,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(192,132,252,0.06) 0%, transparent 50%);
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      color: #ebd5ff;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(168,85,247,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,85,247,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .neon-text {
      color: #c084fc;
      text-shadow: 0 0 8px rgba(168,85,247,0.9), 0 0 20px rgba(168,85,247,0.5);
    }

    .card-cyber {
      background: rgba(18,10,33,0.92);
      border: 1px solid rgba(168,85,247,0.3);
      box-shadow:
        0 0 1px rgba(168,85,247,0.3),
        0 4px 32px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(168,85,247,0.1);
      backdrop-filter: blur(14px);
    }

    .input-cyber {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(168,85,247,0.4);
      color: #e9d5ff;
      font-family: 'Share Tech Mono', monospace;
      border-radius: 8px;
      padding: 12px 16px;
      width: 100%;
      font-size: 0.875rem;
      transition: all 0.2s ease;
      outline: none;
    }
    .input-cyber::placeholder { color: rgba(168,85,247,0.4); }
    .input-cyber:focus {
      border-color: #a855f7;
      box-shadow: 0 0 12px rgba(168,85,247,0.6), inset 0 0 8px rgba(168,85,247,0.1);
    }

    .btn-neon {
      background: linear-gradient(135deg, #a855f7, #6366f1);
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Share Tech Mono', monospace;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 12px rgba(168,85,247,0.4);
    }
    .btn-neon:hover:not(:disabled) {
      box-shadow: 0 0 20px rgba(168,85,247,0.8);
      transform: translateY(-1px);
    }
    .btn-neon:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(168,85,247,0.4);
      color: rgba(233,213,255,0.8);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-outline:hover { border-color: #c084fc; background: rgba(168,85,247,0.15); color: #fff; }

    .tag {
      background: rgba(168,85,247,0.15);
      border: 1px solid rgba(168,85,247,0.3);
      color: #c084fc;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }

    .progress-track {
      background: rgba(168,85,247,0.1);
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 9999px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 9999px;
      background: linear-gradient(90deg, #a855f7, #6366f1);
      box-shadow: 0 0 8px rgba(168,85,247,0.8);
      transition: width 0.1s ease;
    }

    .thumbnail {
      border: 1px solid rgba(168,85,247,0.4);
      box-shadow: 0 0 12px rgba(168,85,247,0.2);
      border-radius: 8px;
      object-fit: cover;
      width: 90px;
      height: 90px;
    }

    .divider { border-color: rgba(168,85,247,0.2); margin: 16px 0; }
    .pulse-neon { animation: pulse-neon 1.4s ease-in-out infinite; }
    @keyframes pulse-neon { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen px-4 py-12 relative z-10">

  <!-- HEADER -->
  <header class="text-center mb-8">
    <div class="flex items-center justify-center gap-2 mb-3">
      <span class="tag">V3.0 MULTI-API</span>
      <span class="tag">ROXO EDITION</span>
    </div>
    <h1 class="neon-text text-5xl font-black tracking-tight mb-2" style="font-size: clamp(2rem, 8vw, 3.25rem);">
      WZN<span style="color: #fff;">_</span>DL
    </h1>
    <p style="color: rgba(168,85,247,0.6); font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase;">
      &gt; UNIVERSAL DOWNLOADER &lt;
    </p>
  </header>

  <!-- MAIN CARD -->
  <main class="card-cyber rounded-xl w-full" style="max-width: 560px; padding: 28px;">

    <!-- URL Input + COLAR Link -->
    <div style="margin-bottom: 20px;">
      <label class="label text-xs uppercase tracking-widest text-purple-400 block mb-2">// Insira o link da mídia</label>
      <div style="display: flex; gap: 8px;">
        <div style="position: relative; flex: 1;">
          <input
            id="url-input"
            type="url"
            class="input-cyber"
            placeholder="TikTok, Instagram, YouTube..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <button 
          id="paste-btn" 
          class="btn-outline" 
          style="padding: 0 16px; border-color: #a855f7; color: #c084fc;"
          onclick="pasteFromClipboard()"
        >
          COLAR
        </button>
      </div>
    </div>

    <!-- BAIXAR Button -->
    <button
      id="analyze-btn"
      class="btn-neon"
      style="width: 100%; padding: 14px; font-size: 0.9rem;"
      onclick="analyzeUrl()"
    >
      BAIXAR
    </button>

    <!-- Slide de Carregamento / Status -->
    <div id="status-box" style="display: none; margin-top: 16px;" class="bg-[#1b0e30] border border-purple-800 rounded-lg p-4 text-center">
      <p id="status-text" class="text-purple-300 text-sm font-medium pulse-neon">CONTACTANDO SERVIDOR DE MÍDIA...</p>
    </div>

    <!-- Resultados e Botões de Download Inteligentes -->
    <div id="media-card" style="display: none; margin-top: 0;">
      <hr class="divider" />

      <!-- Metadados da Mídia Detectada -->
      <div style="display: flex; gap: 14px; margin-bottom: 20px;" class="bg-black/30 p-3 rounded-lg border border-purple-950">
        <div id="thumb-wrap" style="flex-shrink: 0;">
          <img id="thumb" src="" alt="thumbnail" class="thumbnail" />
        </div>
        <div style="flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center;">
          <span id="media-type-tag" class="tag w-max mb-1">DETECTADO</span>
          <p id="media-title" class="text-purple-100 text-sm font-bold truncate">Título da Mídia</p>
          <p id="media-desc" class="text-purple-400 text-xs mt-1 line-clamp-2">Sem descrição disponível.</p>
        </div>
      </div>

      <!-- Barra de Progresso Dinâmica -->
      <div id="progress-wrap" style="display: none; margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: #c084fc; margin-bottom: 6px;">
          <span id="progress-label">PRONTO! BAIXANDO...</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-track">
          <div id="progress-bar" class="progress-bar" style="width: 0%;"></div>
        </div>
      </div>

      <!-- Área Dinâmica dos Botões Injetados via JS -->
      <div id="download-actions" class="flex flex-col gap-2">
        <!-- Botões entram aqui dinamicamente -->
      </div>
    </div>
  </main>

  <footer class="mt-8 text-center" style="font-size: 0.7rem; letter-spacing: 0.08em; color: rgba(168,85,247,0.4);">
    <p>&copy; 2026 WZNDEV &bull; POWERED BY COBALT CORE</p>
  </footer>

  <!-- LÓGICA DO DOWN-INTELLIGENCE -->
  <script>
    const urlInput = document.getElementById('url-input');
    const analyzeBtn = document.getElementById('analyze-btn');
    const statusBox = document.getElementById('status-box');
    const statusText = document.getElementById('status-text');
    const mediaCard = document.getElementById('media-card');
    const mediaTitle = document.getElementById('media-title');
    const mediaDesc = document.getElementById('media-desc');
    const mediaTypeTag = document.getElementById('media-type-tag');
    const thumbImg = document.getElementById('thumb');
    
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    const progressPct = document.getElementById('progress-pct');
    const progressLabel = document.getElementById('progress-label');
    const downloadActions = document.getElementById('download-actions');

    let currentMediaUrl = '';

    // Função Mobile para ler área de transferência direto
    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        urlInput.value = text;
      } catch (err) {
        alert('Dê permissão para o site ler a área de transferência ou cole manualmente.');
      }
    }

    // Reconhecimento do link e Conexão com API Universal
    async function analyzeUrl() {
      const url = urlInput.value.trim();
      if (!url) { alert('Por favor, cole um link antes!'); return; }

      // Reseta visual para aceitar novas requisições na mesma aba
      mediaCard.style.display = 'none';
      progressWrap.style.display = 'none';
      statusBox.style.display = 'block';
      statusText.innerText = 'CONECTANDO E RECONHECENDO LINK DA API...';
      analyzeBtn.disabled = true;

      // Classifica visualmente para o usuário saber o tipo antes da resposta
      let type = 'MÍDIA';
      if(url.includes('tiktok.com')) type = 'TIKTOK VIDEO/SOM';
      if(url.includes('instagram.com/reel')) type = 'INSTAGRAM REELS';
      if(url.includes('instagram.com/p')) type = 'INSTAGRAM FOTO/POST';
      if(url.includes('youtube.com') || url.includes('youtu.be')) type = 'YOUTUBE VÍDEO/ÁUDIO';

      statusText.innerText = `RECONHECIDO: ${type}. CONTACTANDO SERVIDOR...`;

      try {
        // Envia requisição para a infraestrutura do Cobalt
        const res = await fetch('https://api.cobalt.tools/', {
          method: 'POST',
          headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url, filenameStyle: 'pretty' })
        });

        const data = await res.json();

        if (data.status === 'error') {
          throw new Error(data.text);
        }

        // Armazena a url final encontrada
        currentMediaUrl = data.url;

        // Renderiza card de informações básicas fictícias baseadas na plataforma
        mediaTypeTag.innerText = type;
        mediaTitle.innerText = `Mídia processada com sucesso!`;
        mediaDesc.innerText = `Link de origem pronto para download de alta performance nativo.`;
        thumbImg.src = 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150'; // Placeholder padrão roxo cyberpunk

        // Configura botões de acordo com as regras solicitadas por você
        downloadActions.innerHTML = ''; 

        if (type.includes('FOTO')) {
          // SE FOR FOTO: Apenas um botão com a qualidade máxima
          downloadActions.innerHTML = `
            <button class="btn-neon p-3 text-xs" onclick="triggerNativeDownload('${currentMediaUrl}', 'foto')">
              BAIXAR NA MELHOR QUALIDADE POSSÍVEL
            </button>
          `;
        } else {
          // SE FOR VIDEO, REELS OU TEM OPÇÃO DE SOM: Renderiza os botões organizados
          downloadActions.innerHTML = `
            <div class="grid grid-cols-3 gap-2">
              <button class="btn-neon p-2.5 text-xs" onclick="triggerNativeDownload('${currentMediaUrl}', 'video', '1080')">MP4 FHD</button>
              <button class="btn-neon p-2.5 text-xs" style="filter: hue-rotate(30deg);" onclick="triggerNativeDownload('${currentMediaUrl}', 'video', '720')">MP4 HD</button>
              <button class="btn-neon p-2.5 text-xs" style="filter: hue-rotate(60deg);" onclick="triggerNativeDownload('${currentMediaUrl}', 'video', '480')">MP4 SD</button>
            </div>
            <button class="btn-outline mt-1 p-2 text-xs text-center border-purple-500 text-purple-300" onclick="triggerAudioDownload('${url}')">
              <i class="fa-solid fa-music"></i> BAIXAR APENAS O SOM / ÁUDIO
            </button>
          `;
        }

        statusBox.style.display = 'none';
        mediaCard.style.display = 'block';

      } catch (err) {
        alert('Erro ao processar o link. Verifique se o conteúdo não é privado ou deletado.');
        statusBox.style.display = 'none';
      } finally {
        analyzeBtn.disabled = false;
      }
    }

    // Processamento do download com os slides de progresso
    async function triggerNativeDownload(downloadUrl, mediaType, resLabel = '') {
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';
      progressPct.textContent = '0%';
      progressLabel.textContent = `PRONTO! BAIXANDO ${mediaType.toUpperCase()} ${resLabel ? '['+resLabel+'p]' : ''}!`;

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 12 + 5;
        if (progress > 90) progress = 90; // Trava em 90 até terminar o fetch real
        progressBar.style.width = Math.round(progress) + '%';
        progressPct.textContent = Math.round(progress) + '%';
      }, 150);

      try {
        // Dispara o fluxo para o navegador do Android realizar o download limpo
        const tempLink = document.createElement('a');
        tempLink.href = downloadUrl;
        tempLink.setAttribute('download', `wzn_download_${Date.now()}`);
        document.body.appendChild(tempLink);
        tempLink.click();
        document.body.removeChild(tempLink);

        clearInterval(interval);
        progressBar.style.width = '100%';
        progressPct.textContent = '100%';
        progressLabel.textContent = '✅ CONCLUÍDO COM SUCESSO!';

      } catch (e) {
        clearInterval(interval);
        alert('Falha ao baixar o arquivo.');
      }
    }

    // Força a extração de áudio/som nativo se requisitado pelo botão extra
    async function triggerAudioDownload(sourceUrl) {
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';
      progressPct.textContent = '0%';
      progressLabel.textContent = 'PRONTO! EXTRAINDO E BAIXANDO SOM...';

      try {
        const res = await fetch('https://api.cobalt.tools/', {
          method: 'POST',
          headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: sourceUrl, downloadMode: 'audio', filenameStyle: 'pretty' })
        });
        const data = await res.json();
        
        if(data.url) {
          progressBar.style.width = '100%';
          progressPct.textContent = '100%';
          
          const tempLink = document.createElement('a');
          tempLink.href = data.url;
          tempLink.setAttribute('download', `wzn_som_${Date.now()}.mp3`);
          document.body.appendChild(tempLink);
          tempLink.click();
          document.body.removeChild(tempLink);
          
          progressLabel.textContent = '✅ SOM SALVO COM SUCESSO!';
        }
      } catch (err) {
        alert('Não foi possível isolar o áudio desta mídia.');
      }
    }
  </script>
</body>
</html>
