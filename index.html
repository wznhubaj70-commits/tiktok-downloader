<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TTK DOWNLOADER — Baixar TikTok sem marca d'água</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--bg:#0e0b1a;--surface:#16112a;--card:#1c1535;
--border:rgba(139,92,246,.25);--neon:#a855f7;--neon2:#7c3aed;
--glow:rgba(168,85,247,.6);--text:#ede9fe;--muted:#7c6fa0;
--ok:#4ade80;--err:#f87171;
}
body{
background:var(--bg);
background-image:radial-gradient(ellipse at 20% 30%,rgba(124,58,237,.15) 0%,transparent 50%),radial-gradient(ellipse at 80% 70%,rgba(168,85,247,.08) 0%,transparent 45%);
min-height:100vh;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
color:var(--text);display:flex;flex-direction:column;align-items:center;
}
body::before{
content:'';position:fixed;inset:0;
background-image:linear-gradient(rgba(139,92,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,.03) 1px,transparent 1px);
background-size:48px 48px;pointer-events:none;z-index:0;
}
.page{position:relative;z-index:1;width:100%;max-width:680px;padding:0 20px 80px}
.header{padding:48px 0 36px;text-align:center}
.logo{
font-size:clamp(2.4rem,8vw,3.8rem);font-weight:900;letter-spacing:-.02em;
background:linear-gradient(135deg,#a855f7,#7c3aed,#c084fc);
-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
filter:drop-shadow(0 0 20px rgba(168,85,247,.5));
}
.tagline{margin-top:8px;font-size:.85rem;color:var(--muted);letter-spacing:.04em}
.platform-chips{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-top:16px}
.chip{background:rgba(139,92,246,.1);border:1px solid var(--border);border-radius:20px;padding:4px 13px;font-size:.72rem;color:rgba(168,85,247,.8);letter-spacing:.04em}
.search-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;box-shadow:0 4px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(168,85,247,.06);margin-bottom:20px}
.search-label{font-size:.72rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.input-row{display:flex;gap:10px}
.url-wrap{flex:1;position:relative}
.url-inp{width:100%;background:rgba(0,0,0,.4);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:.9rem;padding:13px 42px 13px 16px;outline:none;transition:border-color .2s,box-shadow .2s;font-family:inherit}
.url-inp::placeholder{color:rgba(168,85,247,.3)}
.url-inp:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(168,85,247,.15)}
.clear-btn{display:none;position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer;padding:0;line-height:1;transition:color .15s}
.clear-btn:hover{color:var(--text)}
.paste-btn{background:rgba(139,92,246,.15);border:1.5px solid var(--border);border-radius:10px;color:var(--neon);font-size:.78rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:0 18px;cursor:pointer;white-space:nowrap;transition:all .2s;font-family:inherit}
.paste-btn:hover{background:rgba(139,92,246,.25);border-color:var(--neon);box-shadow:0 0 12px rgba(168,85,247,.25)}
.download-btn{width:100%;margin-top:14px;padding:15px;background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;border-radius:10px;color:#fff;font-size:.95rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 4px 20px rgba(168,85,247,.45);font-family:inherit}
.download-btn:hover:not(:disabled){box-shadow:0 6px 28px rgba(168,85,247,.7);transform:translateY(-1px)}
.download-btn:active:not(:disabled){transform:translateY(0)}
.download-btn:disabled{opacity:.45;cursor:not-allowed}
.status-wrap{margin-bottom:16px}
.status-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;display:flex;align-items:center;gap:14px;font-size:.88rem;color:var(--text)}
.status-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;background:var(--neon);box-shadow:0 0 10px var(--neon);animation:pulse-dot .9s ease-in-out infinite}
.status-dot.ok{background:var(--ok);box-shadow:0 0 10px var(--ok);animation:none}
.status-dot.err{background:var(--err);box-shadow:0 0 10px var(--err);animation:none}
.error-card{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:12px;padding:14px 18px;color:var(--err);font-size:.88rem;display:flex;gap:10px;align-items:flex-start;margin-bottom:16px}
.error-label{font-weight:700;font-size:.72rem;letter-spacing:.1em;flex-shrink:0;padding-top:1px}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,.4)}
.thumb-banner{position:relative;width:100%;background:#000;display:flex;justify-content:center}
.thumb-banner img{width:100%;max-height:320px;object-fit:cover;display:block;opacity:.85}
.thumb-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 40%,rgba(14,11,26,.95) 100%)}
.thumb-meta{position:absolute;bottom:16px;left:20px;right:20px}
.thumb-author{font-size:.8rem;color:rgba(255,255,255,.65);margin-bottom:4px}
.thumb-title{font-size:1rem;font-weight:700;color:#fff;line-height:1.35;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.stats-row{display:flex;gap:20px;padding:14px 20px;border-bottom:1px solid rgba(139,92,246,.12);flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--muted)}
.stat span{color:var(--text);font-weight:600}
.no-thumb{padding:20px;display:flex;gap:16px}
.no-thumb-icon{width:70px;height:70px;background:rgba(139,92,246,.15);border:1px solid var(--border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2rem;flex-shrink:0}
.no-thumb-info{flex:1}
.no-thumb-title{font-size:.95rem;font-weight:600;line-height:1.4;margin-bottom:6px}
.no-thumb-author{font-size:.8rem;color:var(--muted)}
.dl-section{padding:20px}
.dl-section-label{font-size:.72rem;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-bottom:12px}
.btn-grid{display:grid;gap:10px}
.btn-grid.cols-2{grid-template-columns:1fr 1fr}
.btn-grid.cols-1{grid-template-columns:1fr}
.dl-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:14px 16px;border-radius:10px;font-size:.85rem;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:all .2s;border:none;font-family:inherit;text-transform:uppercase}
.dl-btn:disabled{opacity:.35;cursor:not-allowed}
.dl-btn.primary{background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;box-shadow:0 3px 16px rgba(168,85,247,.4)}
.dl-btn.primary:hover:not(:disabled){box-shadow:0 6px 24px rgba(168,85,247,.65);transform:translateY(-1px)}
.dl-btn.secondary{background:rgba(139,92,246,.12);border:1.5px solid rgba(139,92,246,.3);color:var(--text)}
.dl-btn.secondary:hover:not(:disabled){background:rgba(139,92,246,.22);border-color:var(--neon);box-shadow:0 0 14px rgba(168,85,247,.25)}
.dl-btn.audio{background:rgba(74,222,128,.1);border:1.5px solid rgba(74,222,128,.3);color:var(--ok)}
.dl-btn.audio:hover:not(:disabled){background:rgba(74,222,128,.18);border-color:var(--ok);box-shadow:0 0 14px rgba(74,222,128,.25)}
.dl-btn.full{grid-column:1/-1}
.btn-icon{font-size:1.1rem}
.btn-text{display:flex;flex-direction:column;align-items:flex-start;line-height:1.2}
.btn-text small{font-weight:400;font-size:.68rem;opacity:.7;text-transform:none;letter-spacing:0}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px}
.photo-item{position:relative;border-radius:8px;overflow:hidden;border:1.5px solid var(--border);cursor:pointer;transition:all .2s}
.photo-item:hover{border-color:var(--neon);box-shadow:0 0 14px rgba(168,85,247,.4);transform:scale(1.02)}
.photo-item img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.photo-num{position:absolute;bottom:5px;right:6px;background:rgba(0,0,0,.75);color:var(--neon);font-size:.62rem;padding:1px 6px;border-radius:4px;font-weight:700}
.dl-all-btn{margin-top:10px;width:100%;padding:13px;background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;border-radius:10px;color:#fff;font-weight:700;font-size:.85rem;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 3px 16px rgba(168,85,247,.35);font-family:inherit}
.dl-all-btn:hover{box-shadow:0 6px 24px rgba(168,85,247,.6);transform:translateY(-1px)}
.prog-wrap{margin-top:14px;padding:14px 16px;background:rgba(139,92,246,.08);border:1px solid var(--border);border-radius:10px}
.prog-meta{display:flex;justify-content:space-between;font-size:.75rem;color:var(--muted);margin-bottom:8px}
.prog-track{background:rgba(139,92,246,.15);border-radius:9999px;height:6px;overflow:hidden}
.prog-fill{height:100%;border-radius:9999px;background:linear-gradient(90deg,#a855f7,#7c3aed);box-shadow:0 0 8px rgba(168,85,247,.7);transition:width .1s ease;position:relative;overflow:hidden}
.prog-fill::after{content:'';position:absolute;top:0;left:-50%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:scan 1s linear infinite}
.done-banner{margin-top:14px;background:rgba(74,222,128,.08);border:1px solid rgba(74,222,128,.3);border-radius:12px;padding:18px 20px;text-align:center}
.done-title{color:var(--ok);font-size:1.05rem;font-weight:700;margin-bottom:6px}
.done-sub{color:rgba(74,222,128,.6);font-size:.8rem;margin-bottom:14px}
.done-reset{background:transparent;border:1.5px solid rgba(74,222,128,.35);border-radius:8px;color:var(--ok);font-size:.8rem;font-weight:600;padding:8px 22px;cursor:pointer;transition:all .2s;font-family:inherit}
.done-reset:hover{background:rgba(74,222,128,.1);border-color:var(--ok)}
.footer{margin-top:40px;padding-bottom:20px;text-align:center;font-size:.7rem;color:rgba(139,92,246,.35);letter-spacing:.06em}
.hidden{display:none!important}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.75)}}
@keyframes scan{0%{left:-50%}100%{left:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .35s ease forwards}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@media(max-width:480px){.btn-grid.cols-2{grid-template-columns:1fr}.btn-text{align-items:center}}
</style>
</head>
<body>
<div class="page">
<header class="header">
<div class="logo">WZN DL</div>
<div class="tagline">Baixe vídeos do TikTok sem marca d'água — grátis</div>
<div class="platform-chips">
<span class="chip"> Vídeos</span>
<span class="chip"> Fotos</span>
<span class="chip"> Áudio</span>
<span class="chip"> Sem marca d'água</span>
</div>
</header>
<div class="search-box">
<div class="search-label">Cole o link do TikTok abaixo</div>
<div class="input-row">
<div class="url-wrap">
<input id="u" type="url" class="url-inp" placeholder="https://www.tiktok.com/@usuario/video/..." autocomplete="off" spellcheck="false"/>
<button class="clear-btn" id="cb" onclick="clearAll()">×</button>
</div>
<button class="paste-btn" onclick="pasteUrl()"> Colar</button>
</div>
<button class="download-btn" id="db" onclick="iniciar()">⬇ Baixar</button>
</div>
<div id="sw" class="status-wrap hidden">
<div class="status-card">
<div class="status-dot" id="sd"></div>
<span id="st"></span>
</div>
</div>
<div id="ec" class="error-card hidden">
<span class="error-label">Erro</span>
<span id="em"></span>
</div>
<div id="rc" class="result-card hidden fade-up">
<div id="ta"></div>
<div id="sr" class="stats-row hidden"></div>
<div class="dl-section">
<div class="dl-section-label">Escolha o formato</div>
<div id="db2"></div>
<div id="pw" class="prog-wrap hidden">
<div class="prog-meta"><span id="pl"></span><span id="pp"></span></div>
<div class="prog-track"><div id="pf" class="prog-fill" style="width:0%"></div></div>
</div>
<div id="dn" class="done-banner hidden">
<div class="done-title"> Pronto! Baixando seu arquivo...</div>
<div class="done-sub">Verifique sua pasta de downloads.</div>
<button class="done-reset" onclick="clearAll()">↩ Baixar outro vídeo</button>
</div>
</div>
</div>
<div class="footer">Apenas para uso pessoal &bull; Respeite os criadores de conteúdo &bull; Powered by Wzn</div>
</div>
<script id="__app_script__">
const _API = 'https://www.tikwm.com/api/';
let _data = null, _busy = false, _timer = null;
const g = id => document.getElementById(id);
const show = id => g(id).classList.remove('hidden');
const hide = id => g(id).classList.add('hidden');
const wait = ms => new Promise(r => setTimeout(r, ms));

g('u').addEventListener('input', () => { g('cb').style.display = g('u').value ? 'block' : 'none'; });
g('u').addEventListener('keydown', e => { if(e.key==='Enter') iniciar(); });

async function pasteUrl() {
  try { const t = await navigator.clipboard.readText(); g('u').value=t.trim(); g('cb').style.display=t.trim()?'block':'none'; }
  catch { g('u').focus(); }
}

function clearAll() {
  g('u').value=''; g('cb').style.display='none';
  hide('sw'); hide('ec'); hide('rc'); hide('pw'); hide('dn');
  _data=null; _busy=false;
  if(_timer){clearInterval(_timer);_timer=null;}
}

function setStatus(txt, type) {
  show('sw'); g('st').textContent=txt;
  const d=g('sd'); d.className='status-dot';
  if(type==='ok') d.classList.add('ok');
  if(type==='err') d.classList.add('err');
}

function showErr(msg) { g('em').textContent=msg; show('ec'); }

async function iniciar() {
  const url = g('u').value.trim();
  if(!url){ showErr('Cole o link do TikTok no campo acima.'); show('ec'); return; }
  hide('ec'); hide('rc'); hide('dn'); hide('pw');
  const btn=g('db'); btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span> Buscando...';
  setStatus('Conectando à API...');
  await wait(500);
  setStatus('Contactando servidor...');
  await wait(500);
  setStatus('Analisando o link...');
  try {
    const p=new URLSearchParams({url,hd:'1'});
    const r=await fetch(_API+'?'+p,{headers:{Accept:'application/json'},signal:AbortSignal.timeout(15000)});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(j.code!==0||!j.data) throw new Error(j.msg||'Não foi possível processar esse link.');
    setStatus('Conteúdo encontrado ','ok');
    _data=j.data;
    renderResult(j.data);
  } catch(e) {
    setStatus('Falha na requisição','err');
    const m=e.message||'';
    showErr(e.name==='AbortError'||m.includes('fetch')||m.includes('Failed')
      ?'Erro de conexão. Verifique sua internet e tente novamente.'
      :m||'Não foi possível baixar. Verifique se o link é público.');
  } finally {
    btn.disabled=false; btn.innerHTML='⬇ Baixar';
  }
}

function detectType(d) {
  if(Array.isArray(d.images)&&d.images.length>0) return 'photo';
  if(!d.play&&(d.music_info?.play||d.music)) return 'sound';
  return 'video';
}

function fmtN(n){if(!n)return'0';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return String(n);}
function fmtD(s){if(!s)return'';return Math.floor(s/60)+':'+(s%60).toString().padStart(2,'0');}

function renderResult(d) {
  const type=detectType(d);
  const cover=d.cover||d.origin_cover||'';
  const title=(d.title||'').split('#')[0].trim()||'TikTok Content';
  const author=d.author?.nickname?'@'+d.author.nickname:'';
  const ta=g('ta');
  if(cover){
    ta.innerHTML='<div class="thumb-banner"><img src="'+cover+'" alt=""/><div class="thumb-overlay"></div><div class="thumb-meta">'+(author?'<div class="thumb-author">'+author+'</div>':'')+'<div class="thumb-title">'+title+'</div></div></div>';
  } else {
    const ico=type==='photo'?'':type==='sound'?'':'';
    ta.innerHTML='<div class="no-thumb"><div class="no-thumb-icon">'+ico+'</div><div class="no-thumb-info">'+(author?'<div class="no-thumb-author">'+author+'</div>':'')+'<div class="no-thumb-title">'+title+'</div></div></div>';
  }
  const sr=g('sr'); const stats=[];
  if(d.play_count) stats.push('<div class="stat"> <span>'+fmtN(d.play_count)+'</span> views</div>');
  if(d.digg_count) stats.push('<div class="stat"> <span>'+fmtN(d.digg_count)+'</span> curtidas</div>');
  if(d.comment_count) stats.push('<div class="stat"> <span>'+fmtN(d.comment_count)+'</span></div>');
  if(d.share_count) stats.push('<div class="stat">↗ <span>'+fmtN(d.share_count)+'</span></div>');
  if(d.duration) stats.push('<div class="stat">⏱ <span>'+fmtD(d.duration)+'</span></div>');
  if(stats.length){sr.innerHTML=stats.join('');show('sr');}else hide('sr');
  const db2=g('db2'); db2.innerHTML='';
  if(type==='video') buildVideo(db2,d);
  else if(type==='photo') buildPhoto(db2,d);
  else buildSound(db2,d);
  const rc=g('rc'); rc.classList.remove('hidden','fade-up'); void rc.offsetWidth; rc.classList.add('fade-up');
  hide('pw'); hide('dn');
}

function mkBtn(cls,icon,text,sub){
  const b=document.createElement('button');
  b.className='dl-btn '+cls;
  b.innerHTML='<span class="btn-icon">'+icon+'</span><span class="btn-text">'+text+'<small>'+sub+'</small></span>';
  return b;
}

function buildVideo(w,d){
  const hd=d.hdplay||d.play||'',sd=d.play||'',mp3=d.music_info?.play||d.music||'';
  const g2=document.createElement('div'); g2.className='btn-grid cols-2';
  const bHD=mkBtn('primary','','MP4 HD','Melhor qualidade'); bHD.onclick=()=>baixar(hd,'tiktok_hd.mp4','MP4 HD'); g2.appendChild(bHD);
  const bSD=mkBtn('secondary','','MP4 SD','Menor tamanho'); bSD.onclick=()=>baixar(sd,'tiktok_sd.mp4','MP4 SD'); g2.appendChild(bSD);
  if(mp3){const bA=mkBtn('audio full','','Baixar MP3','Só o áudio');bA.onclick=()=>baixar(mp3,'tiktok_audio.mp3','MP3');g2.appendChild(bA);}
  w.appendChild(g2);
}

function buildPhoto(w,d){
  const imgs=d.images||[],mp3=d.music_info?.play||d.music||'';
  const lbl=document.createElement('div');
  lbl.style.cssText='font-size:.75rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;';
  lbl.textContent=imgs.length+' foto'+(imgs.length>1?'s':'')+' no carrossel — clique para baixar';
  w.appendChild(lbl);
  const pg=document.createElement('div'); pg.className='photo-grid';
  imgs.forEach((url,i)=>{
    const it=document.createElement('div'); it.className='photo-item';
    it.innerHTML='<img src="'+url+'" loading="lazy"/><div class="photo-num">'+(i+1)+'</div>';
    it.onclick=()=>baixar(url,'tiktok_foto_'+(i+1)+'.jpg','Foto '+(i+1));
    pg.appendChild(it);
  });
  w.appendChild(pg);
  if(imgs.length>1){
    const ba=document.createElement('button'); ba.className='dl-all-btn';
    ba.textContent='⬇ Baixar todas as '+imgs.length+' fotos';
    ba.onclick=()=>baixarTudo(imgs.map((url,i)=>({url,nome:'tiktok_foto_'+(i+1)+'.jpg',label:'Foto '+(i+1)})));
    w.appendChild(ba);
  }
  if(mp3){
    const sep=document.createElement('div'); sep.style.cssText='border-top:1px solid rgba(139,92,246,.12);margin:14px 0;'; w.appendChild(sep);
    const gg=document.createElement('div'); gg.className='btn-grid cols-1';
    const bA=mkBtn('audio full','','Baixar Música','Áudio do carrossel'); bA.onclick=()=>baixar(mp3,'tiktok_audio.mp3','MP3'); gg.appendChild(bA); w.appendChild(gg);
  }
}

function buildSound(w,d){
  const audioUrl=d.music_info?.play||d.music||'';
  const gg=document.createElement('div'); gg.className='btn-grid cols-1';
  if(audioUrl){
    const bA=mkBtn('audio full','','Baixar Áudio','Formato MP3');
    bA.onclick=()=>baixar(audioUrl,'tiktok_audio.mp3','Áudio');
    gg.appendChild(bA);
  } else {
    const msg=document.createElement('p');
    msg.style.cssText='color:var(--muted);font-size:.85rem;text-align:center;padding:10px 0;';
    msg.textContent='Nenhuma URL de download disponível para este link.';
    gg.appendChild(msg);
  }
  w.appendChild(gg);
}

async function baixar(url,nome,label){
  if(_busy||!url) return;
  _busy=true;
  g('db2').querySelectorAll('button,.photo-item').forEach(b=>{b.tagName==='BUTTON'?b.disabled=true:b.style.pointerEvents='none';});
  hide('dn'); show('pw');
  g('pf').style.width='0%'; g('pp').textContent='0%'; g('pl').textContent='Baixando '+label+'...';
  let pct=0;
  if(_timer) clearInterval(_timer);
  _timer=setInterval(()=>{
    pct=Math.min(pct+Math.random()*8+2,88);
    g('pf').style.width=Math.round(pct)+'%'; g('pp').textContent=Math.round(pct)+'%';
  },200);
  let ok=false;
  try {
    const r=await fetch(url,{mode:'cors',signal:AbortSignal.timeout(60000)});
    if(!r.ok) throw new Error(''+r.status);
    const blob=await r.blob(),obj=URL.createObjectURL(blob);
    fireLink(obj,nome); setTimeout(()=>URL.revokeObjectURL(obj),8000); ok=true;
  } catch {
    try { fireLink(url,nome); ok=true; }
    catch { window.open(url,'_blank','noopener,noreferrer'); ok=true; }
  }
  clearInterval(_timer);
  if(ok){
    g('pf').style.width='100%'; g('pp').textContent='100%'; g('pl').textContent='Concluído!';
    const dn=g('dn'); dn.classList.remove('hidden','fade-up'); void dn.offsetWidth; dn.classList.add('fade-up'); show('dn');
  } else {
    hide('pw'); showErr('Falha no download. Tente novamente.');
    g('db2').querySelectorAll('button').forEach(b=>b.disabled=false);
  }
  _busy=false;
}

async function baixarTudo(itens){
  for(const it of itens){fireLink(it.url,it.nome);await wait(700);}
  const dn=g('dn'); dn.classList.remove('hidden','fade-up'); void dn.offsetWidth; dn.classList.add('fade-up'); show('dn');
}

function fireLink(href,nome){
  const a=document.createElement('a');
  a.href=href; a.download=nome||'wzn_download'; a.target='_blank'; a.rel='noopener noreferrer';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}
</script>
