<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>wzndl</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['monospace'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #06020a;
      min-height: 100vh;
      color: #e2d5f0;
      font-family: monospace;
    }
    .card-base {
      background: #0d0714;
      border: 1px solid #4a2074;
    }
    .input-base {
      background: #000000;
      border: 1px solid #5c2b8e;
      outline: none;
    }
    .input-base:focus {
      border-color: #a855f7;
    }
    .btn-main {
      background: #7c3aed;
      color: #ffffff;
    }
    .btn-main:disabled {
      opacity: 0.5;
    }
    .btn-side {
      border: 1px solid #7c3aed;
      color: #c084fc;
    }
    .barra-bg {
      background: #1a0f26;
    }
    .barra-fill {
      background: #a855f7;
      transition: width 0.1s ease;
    }
  </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

  <div class="w-full max-w-md text-center mb-6">
    <h1 class="text-3xl font-bold tracking-wider text-purple-400">WZN_DL</h1>
  </div>

  <div class="card-base rounded-lg w-full max-w-md p-6">
    <div class="mb-4">
      <div class="flex gap-2">
        <input
          id="url-input"
          type="url"
          class="input-base rounded p-3 flex-1 text-sm text-purple-200"
          placeholder="Cole o link aqui"
          autocomplete="off"
        />
        <button 
          id="paste-btn" 
          class="btn-side rounded px-4 text-xs font-bold"
          onclick="colarLink()"
        >
          COLAR
        </button>
      </div>
    </div>

    <button
      id="analyze-btn"
      class="btn-main rounded w-full p-3 text-sm font-bold tracking-wide"
      onclick="processar()"
    >
      BAIXAR
    </button>

    <div id="status-box" class="hidden mt-4 bg-black/40 border border-purple-900 rounded p-3 text-center">
      <p id="status-text" class="text-purple-300 text-xs">Aguardando...</p>
    </div>

    <div id="media-card" class="hidden mt-4 border-t border-purple-950 pt-4">
      <div id="progress-wrap" class="hidden mb-4">
        <div class="flex justify-between text-xs text-purple-400 mb-1">
          <span id="progress-label">Baixando</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="barra-bg w-full h-2 rounded-full overflow-hidden">
          <div id="progress-bar" class="barra-fill h-full" style="width: 0%;"></div>
        </div>
      </div>

      <div id="download-actions" class="flex flex-col gap-2"></div>
    </div>
  </div>

  <script>
    const urlInput = document.getElementById('url-input');
    const analyzeBtn = document.getElementById('analyze-btn');
    const statusBox = document.getElementById('status-box');
    const statusText = document.getElementById('status-text');
    const mediaCard = document.getElementById('media-card');
    const downloadActions = document.getElementById('download-actions');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    const progressPct = document.getElementById('progress-pct');
    const progressLabel = document.getElementById('progress-label');

    async function colarLink() {
      try {
        const text = await navigator.clipboard.readText();
        urlInput.value = text;
      } catch (err) {
        alert('Erro ao acessar a area de transferencia.');
      }
    }

    async function requisição(urlFinal) {
      const controladores = [
        'https://co.wuk.sh/api/json',
        'https://cobalt.wuk.sh/',
        'https://api.cobalt.tools/'
      ];

      for (let base of controladores) {
        try {
          const res = await fetch(base, {
            method: 'POST',
            headers: { 
              'Accept': 'application/json', 
              'Content-Type': 'application/json' 
            },
            body: JSON.stringify({ 
              url: urlFinal,
              vCodec: 'h264'
            })
          });
          
          if (res.ok) {
            return await res.json();
          }
        } catch (e) {
          continue;
        }
      }
      throw new Error();
    }

    async function processar() {
      const url = urlInput.value.trim();
      if (!url) return;

      mediaCard.classList.add('hidden');
      progressWrap.classList.add('hidden');
      statusBox.classList.remove('hidden');
      statusText.innerText = 'Processando requisicao';
      analyzeBtn.disabled = true;

      try {
        const dados = await requisição(url);

        if (!dados || dados.status === 'error') {
          throw new Error();
        }

        downloadActions.innerHTML = '';

        if (url.includes('instagram.com/p/')) {
          downloadActions.innerHTML = `
            <button class="btn-main rounded w-full p-3 text-xs font-bold" onclick="salvar('${dados.url}', 'arquivo')">
              DOWNLOAD
            </button>
          `;
        } else {
          downloadActions.innerHTML = `
            <div class="grid grid-cols-3 gap-2">
              <button class="btn-main rounded p-2 text-xs font-bold" onclick="salvar('${dados.url}', 'video', 'FHD')">1080P</button>
              <button class="btn-main rounded p-2 text-xs font-bold opacity-80" onclick="salvar('${dados.url}', 'video', 'HD')">720P</button>
              <button class="btn-main rounded p-2 text-xs font-bold opacity-60" onclick="salvar('${dados.url}', 'video', 'SD')">480P</button>
            </div>
            <button class="btn-side rounded mt-2 p-2 text-xs font-bold" onclick="extrairAudio('${url}')">
              BAIXAR AUDIO
            </button>
          `;
        }

        statusBox.classList.add('hidden');
        mediaCard.classList.remove('hidden');

      } catch (err) {
        statusBox.classList.add('hidden');
        alert('Erro no link ou bloqueio de rede. Tente novamente.');
      } finally {
        analyzeBtn.disabled = false;
      }
    }

    function salvar(linkDireto, tipo, res = '') {
      progressWrap.classList.remove('hidden');
      progressBar.style.width = '0%';
      progressPct.textContent = '0%';
      progressLabel.textContent = 'Processando stream';

      let p = 0;
      const t = setInterval(() => {
        p += Math.random() * 12 + 6;
        if (p > 95) p = 95;
        progressBar.style.width = Math.round(p) + '%';
        progressPct.textContent = Math.round(p) + '%';
      }, 100);

      const a = document.createElement('a');
      a.href = linkDireto;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      setTimeout(() => {
        clearInterval(t);
        progressBar.style.width = '100%';
        progressPct.textContent = '100%';
        progressLabel.textContent = 'Concluido';
      }, 600);
    }

    async function extrairAudio(urlOrigem) {
      progressWrap.classList.remove('hidden');
      progressBar.style.width = '0%';
      progressPct.textContent = '0%';
      progressLabel.textContent = 'Convertendo audio';

      try {
        let deves = [
          'https://co.wuk.sh/api/json',
          'https://cobalt.wuk.sh/',
          'https://api.cobalt.tools/'
        ];
        
        let dadosAudio = null;
        for (let b of deves) {
          try {
            const res = await fetch(b, {
              method: 'POST',
              headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
              body: JSON.stringify({ url: urlOrigem, downloadMode: 'audio' })
            });
            if (res.ok) {
              dadosAudio = await res.json();
              break;
            }
          } catch(e) {}
        }

        if (dadosAudio && dadosAudio.url) {
          progressBar.style.width = '100%';
          progressPct.textContent = '100%';
          progressLabel.textContent = 'Concluido';
          
          const a = document.createElement('a');
          a.href = dadosAudio.url;
          a.target = '_blank';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        } else {
          throw new Error();
        }
      } catch (err) {
        alert('Erro ao extrair audio.');
        progressWrap.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
