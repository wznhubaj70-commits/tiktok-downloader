<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WZN_DL — Universal Downloader</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            mono: ['"Share Tech Mono"', '"Fira Code"', 'monospace'],
          },
          colors: {
            cyber: {
              bg: '#0a0512',
              card: '#120a21',
              neon: '#a855f7',
              blue: '#c084fc',
              muted: '#3b0764',
            }
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" />

  <style>
    * { box-sizing: border-box; }

    body {
      background-color: #0a0512;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(168,85,247,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(192,132,252,0.06) 0%, transparent 50%);
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      color: #ebd5ff;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(168,85,247,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,85,247,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .neon-text {
      color: #c084fc;
      text-shadow: 0 0 8px rgba(168,85,247,0.9), 0 0 20px rgba(168,85,247,0.5);
    }

    .card-cyber {
      background: rgba(18,10,33,0.92);
      border: 1px solid rgba(168,85,247,0.3);
      box-shadow:
        0 0 1px rgba(168,85,247,0.3),
        0 4px 32px rgba(0,0,0,0.8),
        inset 0 1px 0 rgba(168,85,247,0.1);
      backdrop-filter: blur(14px);
    }

    .input-cyber {
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(168,85,247,0.4);
      color: #e9d5ff;
      font-family: 'Share Tech Mono', monospace;
      border-radius: 8px;
      padding: 12px 16px;
      width: 100%;
      font-size: 0.875rem;
      transition: all 0.2s ease;
      outline: none;
    }
    .input-cyber::placeholder { color: rgba(168,85,247,0.4); }
    .input-cyber:focus {
      border-color: #a855f7;
      box-shadow: 0 0 12px rgba(168,85,247,0.6), inset 0 0 8px rgba(168,85,247,0.1);
    }

    .btn-neon {
      background: linear-gradient(135deg, #a855f7, #6366f1);
      color: #ffffff;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'Share Tech Mono', monospace;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 0 12px rgba(168,85,247,0.4);
    }
    .btn-neon:hover:not(:disabled) {
      box-shadow: 0 0 20px rgba(168,85,247,0.8);
      transform: translateY(-1px);
    }
    .btn-neon:disabled { opacity: 0.45; cursor: not-allowed; }

    .btn-outline {
      background: transparent;
      border: 1px solid rgba(168,85,247,0.4);
      color: rgba(233,213,255,0.8);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .btn-outline:hover { border-color: #c084fc; background: rgba(168,85,247,0.15); color: #fff; }

    .tag {
      background: rgba(168,85,247,0.15);
      border: 1px solid rgba(168,85,247,0.3);
      color: #c084fc;
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
    }

    .progress-track {
      background: rgba(168,85,247,0.1);
      border: 1px solid rgba(168,85,247,0.2);
      border-radius: 9999px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 9999px;
      background: linear-gradient(90deg, #a855f7, #6366f1);
      box-shadow: 0 0 8px rgba(168,85,247,0.8);
      transition: width 0.1s ease;
    }

    .thumbnail {
      border: 1px solid rgba(168,85,247,0.4);
      box-shadow: 0 0 12px rgba(168,85,247,0.2);
      border-radius: 8px;
      object-fit: cover;
      width: 90px;
      height: 90px;
    }

    .divider { border-color: rgba(168,85,247,0.2); margin: 16px 0; }
    .pulse-neon { animation: pulse-neon 1.4s ease-in-out infinite; }
    @keyframes pulse-neon { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen px-4 py-12 relative z-10">

  <header class="text-center mb-8">
    <div class="flex items-center justify-center gap-2 mb-3">
      <span class="tag">V3.2 ANTI-CORS</span>
      <span class="tag">ROXO EDITION</span>
    </div>
    <h1 class="neon-text text-5xl font-black tracking-tight mb-2" style="font-size: clamp(2rem, 8vw, 3.25rem);">
      WZN<span style="color: #fff;">_</span>DL
    </h1>
    <p style="color: rgba(168,85,247,0.6); font-size: 0.75rem; letter-spacing: 0.25em; text-transform: uppercase;">
      &gt; UNIVERSAL DOWNLOADER &lt;
    </p>
  </header>

  <main class="card-cyber rounded-xl w-full" style="max-width: 560px; padding: 28px;">

    <div style="margin-bottom: 20px;">
      <label class="label text-xs uppercase tracking-widest text-purple-400 block mb-2">// Insira o link da mídia</label>
      <div style="display: flex; gap: 8px;">
        <div style="position: relative; flex: 1;">
          <input
            id="url-input"
            type="url"
            class="input-cyber"
            placeholder="TikTok, Instagram, YouTube..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>
        <button 
          id="paste-btn" 
          class="btn-outline" 
          style="padding: 0 16px; border-color: #a855f7; color: #c084fc;"
          onclick="pasteFromClipboard()"
        >
          COLAR
        </button>
      </div>
    </div>

    <button
      id="analyze-btn"
      class="btn-neon"
      style="width: 100%; padding: 14px; font-size: 0.9rem;"
      onclick="analyzeUrl()"
    >
      BAIXAR
    </button>

    <div id="status-box" style="display: none; margin-top: 16px;" class="bg-[#1b0e30] border border-purple-800 rounded-lg p-4 text-center">
      <p id="status-text" class="text-purple-300 text-sm font-medium pulse-neon">CONTACTANDO SERVIDOR DE MÍDIA...</p>
    </div>

    <div id="media-card" style="display: none; margin-top: 0;">
      <hr class="divider" />

      <div style="display: flex; gap: 14px; margin-bottom: 20px;" class="bg-black/30 p-3 rounded-lg border border-purple-950">
        <div id="thumb-wrap" style="flex-shrink: 0;">
          <img id="thumb" src="" alt="thumbnail" class="thumbnail" />
        </div>
        <div style="flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center;">
          <span id="media-type-tag" class="tag w-max mb-1">DETECTADO</span>
          <p id="media-title" class="text-purple-100 text-sm font-bold truncate">Mídia Processada</p>
          <p id="media-desc" class="text-purple-400 text-xs mt-1 line-clamp-2">Pronto para download de alta performance nativo.</p>
        </div>
      </div>

      <div id="progress-wrap" style="display: none; margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; font-size: 0.75rem; color: #c084fc; margin-bottom: 6px;">
          <span id="progress-label">PRONTO! BAIXANDO...</span>
          <span id="progress-pct">0%</span>
        </div>
        <div class="progress-track">
          <div id="progress-bar" class="progress-bar" style="width: 0%;"></div>
        </div>
      </div>

      <div id="download-actions" class="flex flex-col gap-2"></div>
    </div>
  </main>

  <footer class="mt-8 text-center" style="font-size: 0.7rem; letter-spacing: 0.08em; color: rgba(168,85,247,0.4);">
    <p>&copy; 2026 WZNDEV &bull; ANTI-BLOCK SYSTEM</p>
  </footer>

  <script>
    const urlInput = document.getElementById('url-input');
    const analyzeBtn = document.getElementById('analyze-btn');
    const statusBox = document.getElementById('status-box');
    const statusText = document.getElementById('status-text');
    const mediaCard = document.getElementById('media-card');
    const mediaTypeTag = document.getElementById('media-type-tag');
    const downloadActions = document.getElementById('download-actions');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar = document.getElementById('progress-bar');
    const progressPct = document.getElementById('progress-pct');
    const progressLabel = document.getElementById('progress-label');
    const thumbImg = document.getElementById('thumb');

    const apiEndpoints = [
      'https://cobalt.wuk.sh/',
      'https://api.cobalt.tools/'
    ];

    async function pasteFromClipboard() {
      try {
        const text = await navigator.clipboard.readText();
        urlInput.value = text;
      } catch (err) {
        alert('Por favor, cole manualmente ou dê permissão de área de transferência.');
      }
    }

    async function fetchFromCobalt(payload) {
      let lastError = null;
      
      for (let endpoint of apiEndpoints) {
        try {
          const res = await fetch(endpoint, {
            method: 'POST',
            headers: { 
              'Accept': 'application/json', 
              'Content-Type': 'application/json' 
            },
            body: JSON.stringify(payload)
          });
          
          if (res.ok) {
            return await res.json();
          }
        } catch (err) {
          lastError = err;
        }
      }
      throw lastError || new Error('Todos os servidores estão ocupados.');
    }

    async function analyzeUrl() {
      const url = urlInput.value.trim();
      if (!url) { alert('Cole um link válido primeiro!'); return; }

      mediaCard.style.display = 'none';
      progressWrap.style.display = 'none';
      statusBox.style.display = 'block';
      analyzeBtn.disabled = true;

      let type = 'MÍDIA';
      if(url.includes('tiktok.com')) type = 'TIKTOK VIDEO/SOM';
      if(url.includes('instagram.com/reel')) type = 'INSTAGRAM REELS';
      if(url.includes('instagram.com/p')) type = 'INSTAGRAM FOTO/POST';
      if(url.includes('youtube.com') || url.includes('youtu.be')) type = 'YOUTUBE VÍDEO/ÁUDIO';

      statusText.innerText = `RECONHECIDO: ${type}. ENVIANDO REQUISIÇÃO PARA API`;

      try {
        const data = await fetchFromCobalt({ url: url });

        if (!data || data.status === 'error') {
          throw new Error(data ? data.text : 'Erro interno da API');
        }

        mediaTypeTag.innerText = type;
        thumbImg.src = 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?w=150';
        downloadActions.innerHTML = ''; 

        if (type.includes('FOTO')) {
          downloadActions.innerHTML = `
            <button class="btn-neon w-full p-3 text-xs font-bold" onclick="triggerNativeDownload('${data.url}', 'foto')">
              BAIXAR NA MELHOR QUALIDADE POSSÍVEL
            </button>
          `;
        } else {
          downloadActions.innerHTML = `
            <div class="grid grid-cols-3 gap-2">
              <button class="btn-neon p-2.5 text-xs font-bold" onclick="triggerNativeDownload('${data.url}', 'video', 'FHD')">MP4 FHD</button>
              <button class="btn-neon p-2.5 text-xs font-bold" style="filter: hue-rotate(45deg);" onclick="triggerNativeDownload('${data.url}', 'video', 'HD')">MP4 HD</button>
              <button class="btn-neon p-2.5 text-xs font-bold" style="filter: hue-rotate(90deg);" onclick="triggerNativeDownload('${data.url}', 'video', 'SD')">MP4 SD</button>
            </div>
            <button class="btn-outline mt-2 p-2.5 text-xs text-center border-purple-500 text-purple-300" onclick="triggerAudioDownload('${url}')">
              BAIXAR APENAS ÁUDIO (MP3)
            </button>
          `;
        }

        statusBox.style.display = 'none';
        mediaCard.style.display = 'block';

      } catch (err) {
        console.error(err);
        statusBox.style.display = 'none';
        alert('Erro de conexão ou link incompatível. Verifique se o conteúdo não é privado e tente novamente.');
      } finally {
        analyzeBtn.disabled = false;
      }
    }

    function triggerNativeDownload(downloadUrl, mediaType, resLabel = '') {
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';
      progressPct.textContent = '0%';
      progressLabel.textContent = `PRONTO! BAIXANDO ${mediaType.toUpperCase()} ${resLabel ? resLabel : ''}!`;

      let progress = 0;
      const interval = setInterval(() => {
        progress += Math.random() * 15 + 8;
        if (progress > 95) progress = 95;
        progressBar.style.width = Math.round(progress) + '%';
        progressPct.textContent = Math.round(progress) + '%';
      }, 100);

      const a = document.createElement('a');
      a.href = downloadUrl;
      a.target = '_blank';
      a.setAttribute('download', '');
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      setTimeout(() => {
        clearInterval(interval);
        progressBar.style.width = '100%';
        progressPct.textContent = '100%';
        progressLabel.textContent = 'DOWNLOAD INICIADO';
      }, 800);
    }

    async function triggerAudioDownload(sourceUrl) {
      progressWrap.style.display = 'block';
      progressBar.style.width = '0%';
      progressPct.textContent = '0%';
      progressLabel.textContent = 'BAIXANDO ÁUDIO ';

      try {
        const data = await fetchFromCobalt({ url: sourceUrl, downloadMode: 'audio' });
        
        if (data && data.url) {
          progressBar.style.width = '100%';
          progressPct.textContent = '100%';
          progressLabel.textContent = 'BAIXANDO ÁUDIO';
          
          const a = document.createElement('a');
          a.href = data.url;
          a.target = '_blank';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        } else {
          throw new Error();
        }
      } catch (err) {
        alert('Não foi possível extrair o áudio deste link.');
        progressWrap.style.display = 'none';
      }
    }
  </script>
</body>
</html>
